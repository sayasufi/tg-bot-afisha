sources:
  - name: kudago
    kind: web
    base_url: https://kudago.com/public-api/v1.4
    is_active: true
    crawl_interval_sec: 300
    robots_policy: "Public API"
    config:
      cursor: "1"
      location: "msk"
      page_size: 100

  - name: telegram_public
    kind: telegram
    base_url: https://t.me
    is_active: true
    crawl_interval_sec: 180
    robots_policy: "public channel only"
    config:
      channel: kuda_v_moskva
      cursor: null

  - name: telegram_forward_inbox
    kind: telegram
    base_url: telegram://forwarded
    is_active: true
    crawl_interval_sec: 60
    robots_policy: "messages forwarded by users/admins"
    config: {}
