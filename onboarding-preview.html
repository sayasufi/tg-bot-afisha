<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Окрест · онбординг (превью полировки)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Martian+Mono:wght@400;500;600&family=Unbounded:wght@400;700;800&display=swap" />
<style>
/* ---- exact brand tokens (light) from styles/base.css :root ---- */
:root{
  --bg:#f4f4ef; --plinth:#ffffff; --ink:#0b0b0b; --ink-dim:#5c5c54; --ink-faint:#87877c;
  --line:#0b0b0b; --line-soft:rgba(11,11,11,0.14); --acid:#ccff00; --acid-deep:#a8d400;
  --on-acid:#0b0b0b; --cinnabar:#e63312;
  --display:"Unbounded",system-ui,sans-serif; --grotesk:"Familjen Grotesk",system-ui,sans-serif;
  --mono:"Martian Mono",ui-monospace,monospace; --ease-cut:cubic-bezier(0.16,1,0.3,1);
}
*{box-sizing:border-box}
/* stand-in for the dimmed map underneath the sheet */
body{margin:0;min-height:100dvh;font-family:var(--grotesk);
  background:#b9beb4 radial-gradient(#9aa092 0.7px,transparent 0.8px) 0 0/22px 22px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes dropIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ====== EXACT onboard CSS shipped in styles/states.css ====== */
.onboard{position:fixed;inset:0;z-index:1800;display:grid;place-items:center;padding:16px;
  background:rgba(11,11,11,0.72);animation:fadeIn .2s ease both;}
.onboard__sheet{position:relative;width:100%;max-width:392px;max-height:92dvh;display:flex;flex-direction:column;overflow-y:auto;
  padding:26px 22px 18px;background:var(--plinth);box-shadow:inset 0 0 0 1px var(--ink),8px 8px 0 rgba(11,11,11,0.18);animation:dropIn .34s var(--ease-cut) both;scrollbar-width:none;}
.onboard__sheet::-webkit-scrollbar{display:none}
.onboard__kicker{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.24em;color:var(--ink-faint);}
.onboard__kicker::before{content:"";width:6px;height:6px;background:var(--cinnabar);}
.onboard__title{margin:13px 0 9px;font-family:var(--display);font-weight:800;font-size:clamp(33px,10vw,45px);line-height:.92;letter-spacing:-.05em;text-transform:lowercase;color:var(--ink);}
.onboard__lede{margin:0 0 18px;max-width:32ch;font-family:var(--grotesk);font-size:13px;line-height:1.45;color:var(--ink-dim);}
.onboard__cats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.onboard__cat{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:86px;padding:13px 6px;border:0;background:var(--plinth);box-shadow:inset 0 0 0 1px var(--line-soft);color:var(--ink);cursor:pointer;transition:box-shadow .15s var(--ease-cut),background .15s var(--ease-cut),color .15s var(--ease-cut),transform .1s var(--ease-cut);animation:onboardCat .42s var(--ease-cut) both;}
@keyframes onboardCat{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
@media (hover:hover){.onboard__cat:hover:not(.onboard__cat--active){box-shadow:inset 0 0 0 1.5px var(--ink);}}
.onboard__cat:active{transform:scale(.95)}
.onboard__cat--active{background:var(--acid);color:var(--on-acid);box-shadow:inset 0 0 0 1.5px var(--ink);}
.onboard__cat--active::after{content:"";position:absolute;top:7px;right:7px;width:9px;height:9px;border-top:2px solid var(--cinnabar);border-right:2px solid var(--cinnabar);}
.onboard__caticon{display:grid;place-items:center;color:var(--cat,var(--ink-dim));color:color-mix(in srgb,var(--cat,var(--ink-dim)) 84%,var(--ink));transition:color .15s var(--ease-cut),transform .15s var(--ease-cut);}
.onboard__cat--active .onboard__caticon{color:var(--on-acid);transform:scale(1.06);}
.onboard__catlabel{font-family:var(--grotesk);font-size:11px;font-weight:600;letter-spacing:.005em;line-height:1.05;text-align:center;}
.onboard__foot{position:sticky;bottom:0;margin-top:16px;padding-top:14px;background:linear-gradient(to top,var(--plinth) 74%,transparent);}
.onboard__cta{width:100%;height:52px;border:0;background:rgba(11,11,11,0.045);box-shadow:inset 0 0 0 1px var(--line-soft);color:var(--ink-dim);font-family:var(--mono);font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .16s var(--ease-cut),box-shadow .16s var(--ease-cut),color .16s var(--ease-cut),transform .1s var(--ease-cut);}
.onboard__cta:disabled{cursor:default}
.onboard__cta--ready{background:var(--acid);color:var(--on-acid);font-family:var(--grotesk);font-weight:700;font-size:13.5px;letter-spacing:.04em;text-transform:none;box-shadow:2px 2px 0 var(--cinnabar);}
.onboard__cta--ready:active{background:var(--acid-deep);box-shadow:none;transform:translate(2px,2px);}
.onboard__skip{display:block;width:100%;margin-top:9px;padding:9px;border:0;background:transparent;color:var(--ink-faint);font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;}
.onboard__skip:active{color:var(--ink)}
</style>
</head>
<body>
<div class="onboard" role="dialog" aria-modal="true">
  <div class="onboard__sheet">
    <span class="onboard__kicker">ОКРЕСТ · НАСТРОЙКА</span>
    <h2 class="onboard__title">что вам интересно?</h2>
    <p class="onboard__lede">Отметьте темы — и «Для тебя» соберётся под вас. Поменять можно когда угодно.</p>
    <div class="onboard__cats" id="cats" role="group" aria-label="Темы"></div>
    <div class="onboard__foot">
      <button class="onboard__cta" id="cta" disabled></button>
      <button class="onboard__skip">пропустить</button>
    </div>
  </div>
</div>
<script>

const MIN=3, picked=new Set();
const cats=document.getElementById("cats"), cta=document.getElementById("cta");
CATS.forEach(([k,label,color,path],i)=>{
  const b=document.createElement("button");
  b.type="button"; b.className="onboard__cat"; b.dataset.k=k;
  b.style.setProperty("--cat",color); b.style.animationDelay=(0.04*i+0.04)+"s";
  b.innerHTML=`<span class="onboard__caticon"><svg viewBox="${VB}" width="25" height="25" fill="currentColor" aria-hidden="true">${path}</svg></span><span class="onboard__catlabel">${label}</span>`;
  b.onclick=()=>{ picked.has(k)?picked.delete(k):picked.add(k); b.classList.toggle("onboard__cat--active"); render(); };
  cats.appendChild(b);
});
function render(){
  const n=picked.size, ready=n>=MIN;
  cta.classList.toggle("onboard__cta--ready",ready);
  cta.disabled=!ready;
  cta.textContent = ready ? `Собрать ленту · ${n} →` : `Выберите ещё ${MIN-n}`;
}
render();
</script>
