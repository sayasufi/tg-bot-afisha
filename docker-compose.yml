services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    # Tuned for the workload (small PostGIS DB, NVMe, 16-core/110GB host shared with voice-api). The stock
    # defaults (shared_buffers 128MB / work_mem 4MB / random_page_cost 4 / effective_cache_size 4GB) are
    # pessimal for a server on SSD: raise the sort/hash budget so map/list/recommend sorts stay in RAM, tell
    # the planner the OS cache is large AND the disk is SSD (→ favour index scans over seq scans), bump
    # maintenance + WAL so ingest bursts vacuum/checkpoint less. Postgres-side concurrency is bounded by
    # Odyssey (pool_size 25), so worst-case total work_mem stays a few GB — comfortable in the 93GB free.
    # This is the single source of truth (overrides any postgresql.auto.conf); shm_size lifts /dev/shm off
    # Docker's 64MB default so parallel-query workers can't hit "could not resize shared memory".
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=12GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c max_wal_size=2GB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    shm_size: 1gb
    environment:
      POSTGRES_DB: afisha
      POSTGRES_USER: afisha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-afisha}
    ports:
      # Bind defaults to LOOPBACK (127.0.0.1) — a fresh host / laptop never exposes the DB. The one prod
      # host opts into a public bind by setting POSTGRES_BIND_ADDR=0.0.0.0 in its .env, and ONLY because it
      # also has: (1) the `afisha` role on a STRONG rotated password (not the `afisha:afisha` default), and
      # (2) a server-side iptables DOCKER-USER rule limiting 5432 to the owner's IP (host state, not git).
      # The app never uses this host port (it reaches the DB over the compose net odyssey:6432→postgres:5432).
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afisha -d afisha"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    # Bound memory (volatile-lru evicts only TTL'd caches — map/rec/LLM — and spares
    # no-TTL keys like rec:views) and persist to a volume (rec:views is accumulated
    # engagement data, not recomputable). NOTE: applied at runtime via CONFIG SET; this
    # makes it durable across recreates. The volume is empty on FIRST recreate — copy
    # the current dump.rdb in if rec:views must survive that one-time transition.
    command: redis-server --save 60 1 --maxmemory 512mb --maxmemory-policy volatile-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # PostgreSQL connection pooler (Odyssey, built from source). Brought up ALONGSIDE
  # Postgres; the API/worker DB URLs are repointed to it (odyssey:6432) as a separate,
  # verified step. Config is generated on the server from the .template (password
  # injected from .env), so it's never in git.
  odyssey:
    build:
      context: .
      dockerfile: infra/docker/odyssey.Dockerfile
    restart: unless-stopped
    volumes:
      - ./infra/odyssey/odyssey.conf:/etc/odyssey/odyssey.conf:ro
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-okrest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-okrest-minio-secret}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # Typeahead search engine (typo-tolerant, diacritics-folded). Loopback-only port; the app reaches it
  # over the compose net at meilisearch:7700. Disabled by default app-side (MEILI_SEARCH_ENABLED) → the
  # API falls back to the Postgres trigram search, so this service being down never breaks search.
  meilisearch:
    image: getmeili/meilisearch:v1.13
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meili_data:/meili_data

  # Cloudflare-solver для adstat-скрапера TGStat: реальный браузер на СЕРВЕРНОМ IP решает challenge
  # (cf_clearance из браузера владельца привязан к его IP и на сервере не годится). Loopback-only; воркер
  # ходит на flaresolverr:8191 по compose-сети. Простаивает, пока ADSTAT_TGSTAT_ENABLED=false.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: warning
    ports:
      - "127.0.0.1:8191:8191"

  api:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-6}"
    ports:
      # Loopback-only: external traffic must go through the host nginx edge (TLS, gzip,
      # rate-limit, cache). Internal services reach the API via the docker network.
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/openapi.json >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  # --- Prefect orchestration (schedules + runs every flow) ---
  # Dedicated Postgres for Prefect's orchestration store (flow/task-run state, schedules, logs). Kept
  # SEPARATE from the app `postgres` ON PURPOSE: Prefect writes a constant stream of small state-change
  # transactions, and the SQLite store it replaces serialized those on one writer lock — throttling the
  # runner (overdue-run pileup / "Aborted submission" spam). A standalone instance means that churn never
  # competes with app queries for buffers/WAL/vacuum/connections, and a problem in either DB can't touch
  # the other. Tiny + untuned (the orchestration DB is small); no host port — only prefect-server reaches
  # it over the compose net.
  prefect-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      # Internal-only (no host port), but still set a strong value in prod .env. URL-safe (it goes into a
      # connection URL); dev falls back to a benign default.
      POSTGRES_PASSWORD: ${PREFECT_DB_PASSWORD:-prefect}
    volumes:
      - prefect_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  prefect-server:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      PREFECT_HOME: /data
      PREFECT_SERVER_API_HOST: 0.0.0.0
      # Back the orchestration store with the dedicated Postgres above (was SQLite in /data). asyncpg is
      # already in the prefect image; the schema is auto-migrated on first start. DIRECT to the instance,
      # NOT through Odyssey — Prefect leans on session state / prepared statements that a transaction
      # pooler would break.
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${PREFECT_DB_PASSWORD:-prefect}@prefect-postgres:5432/prefect
      # So the browser-served UI talks to the API at the right origin. Default
      # works via an SSH tunnel (ssh -L 4201:localhost:4201 …); override in .env
      # with the public host for direct access.
      PREFECT_UI_API_URL: ${PREFECT_UI_API_URL-http://localhost:4201/api}
    depends_on:
      prefect-postgres:
        condition: service_healthy
    ports:
      # Loopback-only: the Prefect API/UI has no auth — reach it via SSH tunnel
      # (ssh -L 4201:localhost:4201 …). Host 4201 (4200 is taken by another Prefect
      # stack on this host); the in-network link prefect-serve -> prefect-server:4200
      # is unaffected.
      - "127.0.0.1:4201:4200"
    # No volume: the orchestration store is now prefect-postgres, and PREFECT_HOME=/data holds only
    # regenerable config (no SQLite is created while PREFECT_API_DATABASE_CONNECTION_URL points at PG).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  prefect-serve:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    restart: unless-stopped
    # Schedules + runs every flow in one process (was: celery worker + beat).
    command: python -m apps.worker.worker.prefect_serve
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    depends_on:
      prefect-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    restart: unless-stopped
    command: python -m apps.bot.main
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_healthy

  miniapp:
    build:
      context: ./miniapp
      dockerfile: ../infra/docker/miniapp.Dockerfile
    restart: unless-stopped
    environment:
      # Default only when UNSET; an explicit empty value means same-origin
      # (the API is reverse-proxied under /v1 on whatever host serves the app).
      VITE_API_BASE: ${VITE_API_BASE-http://localhost:8000}
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173 --strictPort"
    ports:
      - "5173:5173"
    volumes:
      - ./miniapp:/miniapp
      # Keep the image's installed dependencies visible under the bind mount.
      - /miniapp/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
  prefect_pg_data:
  redis_data:
  meili_data:
