services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: afisha
      POSTGRES_USER: afisha
      POSTGRES_PASSWORD: afisha
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afisha -d afisha"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: sh -c "alembic upgrade head && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/openapi.json >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: sh -c "alembic upgrade head && celery -A apps.worker.worker.celery_app.celery_app worker -l info -Q fetch,normalize,enrich,dedup"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: sh -c "alembic upgrade head && celery -A apps.worker.worker.celery_app.celery_app beat -l info"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: sh -c "alembic upgrade head && python -m apps.bot.bot.main"
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_healthy

  miniapp:
    build:
      context: ./miniapp
      dockerfile: ../infra/docker/miniapp.Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./miniapp:/miniapp
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
