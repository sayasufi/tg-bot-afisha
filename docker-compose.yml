services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: afisha
      POSTGRES_USER: afisha
      POSTGRES_PASSWORD: afisha
    ports:
      # Host 5433 -> container 5432: avoids clashing with a local Postgres on 5432.
      # The app reaches the DB over the compose network (postgres:5432), not this port.
      - "127.0.0.1:5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afisha -d afisha"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-okrest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-okrest-minio-secret}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: sh -c "alembic upgrade head && uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/openapi.json >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: celery -A apps.worker.worker.celery_app.celery_app worker -l info -Q fetch,normalize,enrich,dedup
    # Lets the worker reach services published on the docker host (e.g. a local LLM).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: celery -A apps.worker.worker.celery_app.celery_app beat -l info
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    env_file: .env
    command: python -m apps.bot.bot.main
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_healthy

  miniapp:
    build:
      context: ./miniapp
      dockerfile: ../infra/docker/miniapp.Dockerfile
    environment:
      # Default only when UNSET; an explicit empty value means same-origin
      # (the API is reverse-proxied under /v1 on whatever host serves the app).
      VITE_API_BASE: ${VITE_API_BASE-http://localhost:8000}
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173 --strictPort"
    ports:
      - "5173:5173"
    volumes:
      - ./miniapp:/miniapp
      # Keep the image's installed dependencies visible under the bind mount.
      - /miniapp/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
