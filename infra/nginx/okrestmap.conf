# Окрест — host nginx vhosts. okrestmap.ru = marketing landing (static); app.okrestmap.ru = the Telegram
# mini-app (the Vite SPA on :5173). API (:8000) is reachable under /v1 on both. Deploy:
#   sudo cp infra/nginx/okrestmap.conf /etc/nginx/sites-available/okrestmap && sudo nginx -t && sudo systemctl reload nginx
# Upstreams `okrest_api` + proxy_cache zone `okrest` are defined at http-level elsewhere on the host.

# ---- MINI-APP: app.okrestmap.ru (the SPA — Telegram-only; the SPA itself redirects browsers to the landing) ----
server {
    server_name app.okrestmap.ru;

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/javascript text/css application/xml image/svg+xml;

    # Vite content-hashed assets are immutable — cache hard so reopens skip per-chunk revalidation.
    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # On-box "CDN": cache the cacheable GET reads at the edge (must precede the generic /v1 regex).
    location ~ "^/v1/(events/map|events/list|events/[0-9a-fA-F-]{36}|search|categories|places)(\?|$)" {
        proxy_pass http://okrest_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache okrest;
        proxy_cache_valid 200 60s;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location ~ ^/(v1|docs|openapi\.json|redoc) {
        proxy_pass http://okrest_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Gated SPA — no crawlable content (browsers get redirected to the landing). Keep it out of search.
        add_header X-Robots-Tag "noindex, nofollow" always;
        # The HTML shell (index.html) references content-hashed chunks. It MUST revalidate every load, else
        # a browser/edge-cached shell after a deploy points at deleted /assets/<old-hash> → 404 → white
        # screen for returning users. /assets/ stays immutable (own block); only the shell is no-cache.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache" always;
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/app.okrestmap.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.okrestmap.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---- ADMIN: admin.okrestmap.ru (owner-only control panel — separate SPA on loopback :5174) ----
# Cert is obtained SEPARATELY before this block goes live (chicken-egg): on the server run
#   sudo certbot certonly --nginx -d admin.okrestmap.ru
# THEN copy this config + reload. (DNS already resolves admin.* via the wildcard A record.)
server {
    server_name admin.okrestmap.ru;

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/javascript text/css application/xml image/svg+xml;

    # Never index the control panel.
    add_header X-Robots-Tag "noindex, nofollow" always;
    # HTTPS-only: tell the browser to always use TLS for this host (kills the "first hit over http" gap
    # that leaves a stale insecure indicator). 1 year; no includeSubDomains (other subdomains differ).
    add_header Strict-Transport-Security "max-age=31536000" always;

    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:5174;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # API same-origin (no CORS). NO edge cache — admin data is live + per-session.
    location ~ ^/(v1|docs|openapi\.json|redoc) {
        proxy_pass http://okrest_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/admin.okrestmap.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.okrestmap.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---- LANDING: okrestmap.ru + www (static business card; the map lives at app.okrestmap.ru) ----
server {
    server_name okrestmap.ru www.okrestmap.ru;

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/javascript text/css application/xml image/svg+xml;

    # Keep the API reachable on the apex too (harmless safety — old links / direct calls).
    location ~ ^/(v1|docs|openapi\.json|redoc) {
        proxy_pass http://okrest_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /var/www/okrest-landing;
    index index.html;
    # Single-page landing: serve real files, but return a real 404 for unknown paths (no soft-404 dup pages).
    location / {
        try_files $uri $uri/ =404;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/okrestmap.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/okrestmap.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---- HTTP -> HTTPS for all three hosts ----
server {
    listen 80;
    server_name okrestmap.ru www.okrestmap.ru app.okrestmap.ru admin.okrestmap.ru;
    return 301 https://$host$request_uri;
}
