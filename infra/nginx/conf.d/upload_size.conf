# Raise the request body limit above nginx's 1MB default so event-submission photo uploads
# (POST /v1/suggest/upload, a base64 data URL) aren't rejected with 413. The Mini App downscales
# client-side to ~1280px first, so bodies are normally well under this; 12m is the safety ceiling.
#
# Deployed on the host at /etc/nginx/conf.d/upload_size.conf (included from nginx.conf http{}).
client_max_body_size 12m;
