<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>okrest tile renderer</title>
    <!-- Служебная страница для apps/tiles: headless-хром рендерит ЗДЕСЬ нашу векторную карту
         (тот же maplibre + tuneStyle, что у клиентов с GPU) и нарезает её в растровые PNG-тайлы
         для машин без аппаратного WebGL. Не является публичной страницей приложения. -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="module" src="/src/tilerender.ts"></script>
  </body>
</html>
