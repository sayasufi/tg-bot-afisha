<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4EF" />
    <title>Окрест · карта событий</title>
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="preconnect" href="https://media.kudago.com" crossorigin />
    <link rel="dns-prefetch" href="https://tiles.openfreemap.org" />
    <link rel="dns-prefetch" href="https://media.kudago.com" />
    <!-- Load fonts without blocking first render (display=swap fills with a fallback). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Martian+Mono:wght@400;500;600&family=Unbounded:wght@400;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Martian+Mono:wght@400;500;600&family=Unbounded:wght@400;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Martian+Mono:wght@400;500;600&family=Unbounded:wght@400;700;800&display=swap"
      />
    </noscript>
    <style>
      /* Instant brand splash (shown before the bundle/CSS load, removed on mount). */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f4f4ef;
        transition: opacity 0.35s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash .splash__word {
        font-family: "Unbounded", system-ui, sans-serif;
        font-weight: 800;
        font-size: 30px;
        letter-spacing: -0.04em;
        color: #0b0b0b;
        display: flex;
      }
      /* Kinetic wordmark: letters rise in sequence (variant.com staggered type). */
      #splash .splash__word span {
        display: inline-block;
        animation: splashletter 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: calc(0.18s + var(--i) * 0.05s);
      }
      #splash .emblem {
        position: relative;
        animation: splashpin 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      /* Soft halo behind the acid disc — emblem with light (variant.com RxH). */
      #splash .emblem::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 40%;
        width: 130px;
        height: 130px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, #ccff00 0%, transparent 62%);
        opacity: 0.28;
        z-index: -1;
      }
      @keyframes splashpin {
        from {
          transform: translateY(-12px) scale(0.9);
          opacity: 0;
        }
      }
      @keyframes splashletter {
        from {
          transform: translateY(14px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg class="emblem" width="92" height="92" viewBox="0 0 512 512" aria-hidden="true">
        <path d="M256 56 C168.9 56 98 126.9 98 214 C98 320 256 456 256 456 C256 456 414 320 414 214 C414 126.9 343.1 56 256 56 Z" fill="#0b0b0b" />
        <circle cx="256" cy="202" r="84" fill="#ccff00" />
        <circle cx="256" cy="202" r="32" fill="#0b0b0b" />
      </svg>
      <div class="splash__word">
        <span style="--i: 0">о</span><span style="--i: 1">к</span><span style="--i: 2">р</span><span style="--i: 3">е</span><span style="--i: 4">с</span><span style="--i: 5">т</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
